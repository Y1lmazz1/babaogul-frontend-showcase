<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Oğul | Pro Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff6a00; --bg: #0f0f0f; --card: #1a1a1a; --modal: #252525; --danger: #e74c3c; --success: #2ecc71; --info: #3498db; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto 20px; }
        .add-btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { opacity: 0.8; transform: scale(1.05); }
        .logout-btn {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.logout-btn:hover {
    background-color: #c0392b;
    transform: scale(1.05);
}
        .car-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .car-card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #333; position: relative; transition: 0.3s; }
        .car-card.is-sold { opacity: 0.6; filter: grayscale(0.5); }
        .car-card:hover { border-color: var(--primary); }
        .car-card img { width: 100%; height: 180px; object-fit: cover; }
        .car-card-body { padding: 15px; }
        .car-price { color: var(--primary); font-weight: bold; font-size: 1.2rem; display: block; margin-top: 5px; }
        
        /* Rozetler */
        .badge { position: absolute; top: 10px; padding: 5px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; z-index: 10; }
        .discount-label { right: 10px; background: var(--success); color: white; }
        .sold-label { left: 10px; background: var(--danger); color: white; }

        /* Kart Üstü Butonlar */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; border-top: 1px solid #333; padding-top: 15px; }
        .action-btn { border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; font-size: 0.75rem; }
        .btn-edit { background: var(--info); color: white; }
        .btn-delete { background: #444; color: #ff9999; }
        .btn-sold { grid-column: span 2; background: #222; color: #eee; border: 1px solid #444; }
        .btn-sold.active { background: var(--danger); color: white; border: none; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--modal); padding: 30px; border-radius: 20px; width: 95%; max-width: 600px; border: 1px solid var(--primary); position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 1.5rem; cursor: pointer; color: #888; }
        
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.8rem; color: #aaa; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; background: #111; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; box-sizing: border-box; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--primary); }
        
        .preview-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; background: #111; padding: 10px; border-radius: 8px; border: 1px dashed #444; min-height: 50px; }
        .img-wrapper { position: relative; width: 80px; height: 60px; border-radius: 5px; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; border-radius: 5px; border: 1px solid #333; }
        .remove-btn { position: absolute; top: -7px; right: -7px; background: var(--danger); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid #fff; }

        .save-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 20px; font-size: 1rem; }
        #statusInfo { color: var(--primary); text-align: center; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body style="display: none;"> 

<div class="header">
    <h2><i class="fas fa-car-side"></i> Baba Oğul Yönetim</h2>
 
    <button class="add-btn" onclick="yeniIlanAc()"><i class="fas fa-plus"></i> Yeni İlan Ekle</button>
</div>

<div id="liste" class="car-grid"></div> 

<!-- Düzenleme/Ekleme Modalı -->
<div class="modal-overlay" id="modal">
    <div class="modal-content">
        <span class="close-modal" onclick="modalKapat()">&times;</span>
        <h3 id="modalTitle" style="color:var(--primary); margin-top: 0; text-align: center;">Araç Bilgileri</h3>
        
        <input type="hidden" id="editId">
        <input type="hidden" id="prevPrice"> 

        <div class="form-group">
            <label>Marka / Model</label>
            <input type="text" id="vName" placeholder="Örn: Volkswagen Golf 1.6 TDI">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div class="form-group">
                <label>Model Yılı</label>
                <input type="number" id="vYear" placeholder="2020">
            </div>
            <div class="form-group">
                <label>Kilometre</label>
                <input type="text" id="vKm" placeholder="125.000">
            </div>
            <div class="form-group">
                <label>Vites</label>
                <input type="text" id="vSanziman" placeholder="Otomatik / Manuel">
            </div>
            <div class="form-group">
                <label>Motor / Yakıt</label>
                <input type="text" id="vMotor" placeholder="1.6 Dizel">
            </div>
        </div>

        <div class="form-group">
            <label>Kaporta (Boya / Değişen)</label>
            <input type="text" id="vKaporta" placeholder="Hatasız / 2 Parça Boyalı">
        </div>

        <div class="form-group">
            <label>Hasar Kaydı</label>
            <input type="text" id="vHasar" placeholder="Yok / 5.000 TL">
        </div>

        <div class="form-group">
            <label>Satış Fiyatı (TL)</label>
            <input type="number" id="vPrice" placeholder="950000">
        </div>

        <div class="form-group">
            <label><i class="fas fa-camera"></i> Fotoğraf Ekle (Seçtikçe Birikir)</label>
            <input type="file" id="vFiles" multiple accept="image/*" onchange="havuzaEkle(this)">
            <div class="preview-container" id="previewArea"></div>
        </div>

        <div id="statusInfo">İşlem yapılıyor, usta bekle...</div>

        <button class="save-btn" id="saveBtn" onclick="kaydet()">SİTEYE GÖNDER</button>
    </div>
</div>

<!-- Firebase Compat Libraries -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script> <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
    

    const firebaseConfig = {
    
    apiKey: "YOUR_API_KEY_HERE",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
};;

    // Firebase Initialization
    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    // ✅ BU KISMI BÖYLE GÜNCELLE
const auth = firebase.auth();
auth.onAuthStateChanged((user) => {
    if (!user) {
        // Giriş yoksa kapı dışarı
        window.location.href = "admin-login"; // .html silindi
    } else {
        // GİRİŞ VARSA SAYFAYI GÖSTER!
        document.body.style.display = "block";
        console.log("Hoş geldin usta:", user.email);
    }
});

    let dosyaHavuzu = [];
    let mevcutResimler = [];

    // LİSTEYİ GETİR
    db.collection("satiliklar").orderBy("tarih", "desc").onSnapshot(s => {
        const l = document.getElementById('liste'); l.innerHTML = "";
        s.forEach(doc => {
            const v = doc.data();
            const indirim = v.eskiFiyat ? `<div class="badge discount-label">FIRSAT</div>` : "";
            const satildiEtiketi = v.durum === "satildi" ? `<div class="badge sold-label">SATILDI</div>` : "";
            const kartSinifi = v.durum === "satildi" ? "car-card is-sold" : "car-card";
            const satildiButonMetni = v.durum === "satildi" ? "Satışa Geri Al" : "Satıldı İşaretle";
            const satildiButonSinifi = v.durum === "satildi" ? "action-btn btn-sold active" : "action-btn btn-sold";

            l.innerHTML += `
                <div class="${kartSinifi}">
                    ${indirim}
                    ${satildiEtiketi}
                    <img src="${v.resim}">
                    <div class="car-card-body">
                        <b>${v.ad}</b>
                        <span class="car-price">${Number(v.fiyat).toLocaleString()} TL</span>
                        
                        <div class="card-actions">
                            <button class="action-btn btn-edit" onclick="duzenleAc('${doc.id}')">
                                <i class="fas fa-edit"></i> Düzenle
                            </button>
                            <button class="action-btn btn-delete" onclick="silmeIslemi('${doc.id}')">
                                <i class="fas fa-trash"></i> Sil
                            </button>
                            <button class="${satildiButonSinifi}" onclick="durumDegistir('${doc.id}', '${v.durum}')">
                                <i class="fas fa-check-circle"></i> ${satildiButonMetni}
                            </button>
                        </div>
                    </div>
                </div>`;
        });
    }, (error) => {
        console.error("Firestore error:", error);
    });

    // DURUM DEĞİŞTİR (SATILDI / SATIŞTA)
    function durumDegistir(id, suankiDurum) {
        const yeniDurum = suankiDurum === "satildi" ? "satista" : "satildi";
        db.collection("satiliklar").doc(id).update({
            durum: yeniDurum
        }).catch(err => alert("Durum güncellenirken hata: " + err.message));
    }

    // FOTOĞRAF HAVUZU SİSTEMİ
    function havuzaEkle(input) {
        const yeniDosyalar = Array.from(input.files);
        yeniDosyalar.forEach(file => {
            dosyaHavuzu.push(file);
            const reader = new FileReader();
            reader.onload = function(e) {
                const index = dosyaHavuzu.length - 1;
                const html = `
                    <div class="img-wrapper" id="img-card-${index}">
                        <img src="${e.target.result}">
                        <div class="remove-btn" onclick="resmiKaldir(${index})"><i class="fas fa-times"></i></div>
                    </div>`;
                document.getElementById('previewArea').insertAdjacentHTML('beforeend', html);
            }
            reader.readAsDataURL(file);
        });
        input.value = ""; 
    }

    function resmiKaldir(idx) {
        dosyaHavuzu[idx] = null;
        const el = document.getElementById(`img-card-${idx}`);
        if(el) el.remove();
    }

    function duzenleAc(id) {
        db.collection("satiliklar").doc(id).get().then(doc => {
            if (!doc.exists) return;
            const v = doc.data();
            document.getElementById('editId').value = id;
            document.getElementById('vName').value = v.ad;
            document.getElementById('vYear').value = v.yil;
            document.getElementById('vKm').value = v.km;
            document.getElementById('vSanziman').value = v.sanziman || "";
            document.getElementById('vMotor').value = v.motor || "";
            document.getElementById('vKaporta').value = v.kaporta || "";
            document.getElementById('vHasar').value = v.hasar || "";
            document.getElementById('vPrice').value = v.fiyat;
            document.getElementById('prevPrice').value = v.fiyat;
            
            mevcutResimler = v.resimler || [];
            dosyaHavuzu = [];
            document.getElementById('previewArea').innerHTML = ""; 
            
            mevcutResimler.forEach((img) => {
                 const html = `
                    <div class="img-wrapper">
                        <img src="${img}">
                    </div>`;
                document.getElementById('previewArea').insertAdjacentHTML('beforeend', html);
            });

            document.getElementById('modalTitle').innerText = "Aracı Düzenle";
            document.getElementById('modal').style.display = "flex";
        });
    }

    function yeniIlanAc() {
        document.getElementById('editId').value = "";
        document.getElementById('vName').value = "";
        document.getElementById('vPrice').value = "";
        document.getElementById('vYear').value = "";
        document.getElementById('vKm').value = "";
        document.getElementById('vSanziman').value = "";
        document.getElementById('vMotor').value = "";
        document.getElementById('vKaporta').value = "";
        document.getElementById('vHasar').value = "";
        document.getElementById('prevPrice').value = "";
        
        mevcutResimler = [];
        dosyaHavuzu = [];
        document.getElementById('previewArea').innerHTML = "";
        document.getElementById('modalTitle').innerText = "Yeni İlan Ekle";
        document.getElementById('modal').style.display = "flex";
    }

    function modalKapat() { document.getElementById('modal').style.display = "none"; }

    async function kaydet() {
        const id = document.getElementById('editId').value;
        const vName = document.getElementById('vName').value;
        const newPrice = Number(document.getElementById('vPrice').value);
        const oldPriceStored = Number(document.getElementById('prevPrice').value);
        
        const gonderilecekDosyalar = dosyaHavuzu.filter(f => f !== null);

        if(!vName || !newPrice) {
            return alert("Usta isim ve fiyatı boş bırakma!");
        }

        const btn = document.getElementById('saveBtn');
        const status = document.getElementById('statusInfo');
        btn.disabled = true;
        status.style.display = "block";

        try {
            let finalUrls = [...mevcutResimler]; 
            
            for(let f of gonderilecekDosyalar) {
                const fd = new FormData(); 
                fd.append("image", f);
const res = await fetch(`https://api.imgbb.com/1/upload?key=YOUR_IMGBB_API_KEY`, {method:"POST", body:fd});
                const r = await res.json();
                if(r.success) finalUrls.push(r.data.url);
            }

            const kapakResmi = finalUrls.length > 0 ? finalUrls[0] : "https://via.placeholder.com/400x300?text=Fotograf+Yok";

            const veri = {
                ad: vName,
                yil: document.getElementById('vYear').value || "",
                km: document.getElementById('vKm').value || "",
                sanziman: document.getElementById('vSanziman').value || "",
                motor: document.getElementById('vMotor').value || "",
                kaporta: document.getElementById('vKaporta').value || "",
                hasar: document.getElementById('vHasar').value || "",
                fiyat: newPrice,
                resimler: finalUrls,
                resim: kapakResmi,
                tarih: Date.now(),
                durum: "satista" // Varsayılan durum
            };

            // Eğer düzenleme yapılıyorsa mevcut durumu koru
            if (id) {
                delete veri.durum; // Mevcut durumu ezmemek için güncelleme paketinden çıkarıyoruz
            }

            if(id && oldPriceStored > 0) {
                if(newPrice < oldPriceStored) {
                    veri.eskiFiyat = oldPriceStored;
                } else if(newPrice > oldPriceStored) {
                    veri.eskiFiyat = null; 
                }
            }

            if(id) {
                await db.collection("satiliklar").doc(id).update(veri);
            } else {
                await db.collection("satiliklar").add(veri);
            }

            status.innerText = "Başarıyla kaydedildi!";
            setTimeout(() => location.reload(), 1000);
            
        } catch (e) { 
            console.error(e);
            alert("Hata oluştu usta: " + e.message); 
            btn.disabled = false; 
            status.style.display = "none"; 
        }
    }

    function silmeIslemi(id) {
        if(confirm("Bu ilan tamamen silinecek. Emin misin usta?")) {
            db.collection("satiliklar").doc(id).delete().then(() => {
                alert("İlan silindi.");
            }).catch(err => {
                alert("Silme hatası: " + err.message);
            });
        }
    }
</script>




</body>
</html>
