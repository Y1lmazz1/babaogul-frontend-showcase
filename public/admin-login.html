<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baba Oğul Kaporta | Yönetim Girişi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff6a00;
            --bg: #0f0f0f;
            --card: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(150px);
            opacity: 0.1;
            top: 10%;
            left: 10%;
            z-index: -1;
        }

        .login-container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid #333;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 380px;
            text-align: center;
            transition: 0.3s;
        }

        .login-container:hover { border-color: var(--primary); }

        .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: 1px; }
        .logo span { color: var(--primary); }

        p { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; }

        input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            background: #252525;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #2a2a2a; }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #e65c00;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 106, 0, 0.4);
        }

        button:disabled { background: #555; cursor: not-allowed; }

        .error-msg {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            display: none;
            border: 1px solid rgba(255, 68, 68, 0.2);
        }

        .footer-text { margin-top: 30px; font-size: 0.8rem; color: #444; }
    </style>
</head>
<body>

<div class="login-container"
>
    <div class="logo">BABA OĞUL <span>ADMİN</span>
    </div>
    
    <p>Panel erişimi için e-posta ve şifrenizi girin.</p>

    <div id="errorBox" class="error-msg">
        <i class="fas fa-exclamation-circle"></i> E-posta veya şifre hatalı!
    </div>

    <div class="input-group">
        <i class="fas fa-envelope"></i>
        <input type="email" id="email" placeholder="E-posta Adresi" required>
    </div>

    <div class="input-group">
        <i class="fas fa-lock"></i>
        <input type="password" id="password" placeholder="Şifre" required>
    </div>

    <button onclick="checkLogin()" id="loginBtn">GİRİŞ YAP</button>

    <div class="footer-text">
        &copy; 2026 Baba Oğul Kaporta - Yönetim Paneli
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>

<script>
   // ⚠️ BURASI EKSİKTİ, BUNU EKLE:
    const firebaseConfig = {
        apiKey: "AIzaSyA6KYqPSatS4o-kfraOrXkbu0Kj_s6uMi4",
        authDomain: "babaogulkaporta.firebaseapp.com",
        projectId: "babaogulkaporta",
        storageBucket: "babaogulkaporta.firebasestorage.app",
        messagingSenderId: "603247279596",
        appId: "1:603247279596:web:8cce688f03f403c34514c9"
    };

    // Firebase'i Başlat
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Geri kalan fonksiyonun zaten doğru...
    

    async function checkLogin() {
        const e = document.getElementById('email').value;
        const p = document.getElementById('password').value;
        const err = document.getElementById('errorBox');
        const btn = document.getElementById('loginBtn');

        if (!e || !p) {
            alert("Lütfen tüm alanları doldur usta!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "KONTROL EDİLİYOR...";
        err.style.display = "none";

        try {
            // Firebase Auth ile Giriş Sorgusu
            await auth.signInWithEmailAndPassword(e, p);
            
            // BAŞARILI: Direkt yönlendir (sessionStorage'a gerek yok, Firebase hatırlar)
            window.location.href = "admin-panel"; // .html silindi

        } catch (error) {
            console.error("Giriş Hatası:", error.code);
            err.style.display = "block";
            // Hata mesajını özelleştirebilirsin
            if(error.code === "auth/user-not-found") err.innerText = "Böyle bir kullanıcı yok!";
            else if(error.code === "auth/wrong-password") err.innerText = "Şifre hatalı usta!";
            else err.innerText = "Giriş başarısız. Bilgileri kontrol et.";

            btn.disabled = false;
            btn.innerText = "GİRİŞ YAP";
            
            // Sarsılma Efekti
            const container = document.querySelector('.login-container');
            container.style.boxShadow = "0 0 20px #ff4444";
            setTimeout(() => container.style.boxShadow = "0 15px 35px rgba(0,0,0,0.5)", 500);
        }
    }
</script>

</body>
</html>
